name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Assetra.slnx

      - name: Publish
        run: >
          dotnet publish Assetra.WPF/Assetra.WPF.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId Assetra
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish/
          --mainExe Assetra.WPF.exe
          --outputDir releases/

      - name: Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          vpk upload github
          --repoUrl https://github.com/oange6214/Assetra
          --publish
          --releaseName "Assetra ${{ github.ref_name }}"
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir releases/
