name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore Assetra.slnx

      - name: Publish
        run: >
          dotnet publish Assetra.WPF/Assetra.WPF.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId Assetra
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish/
          --mainExe Assetra.WPF.exe
          --outputDir releases/

      - name: Validate Velopack output
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "releases"
          if (-not (Test-Path $releaseDir)) {
            throw "Velopack output directory was not created: $releaseDir"
          }

          $assetNames = @(Get-ChildItem -Path $releaseDir -File | ForEach-Object { $_.Name })
          $missing = New-Object System.Collections.Generic.List[string]

          foreach ($name in @("RELEASES", "releases.win.json", "Assetra-win-Setup.exe", "Assetra-win-Portable.zip")) {
            if ($assetNames -notcontains $name) {
              $missing.Add($name)
            }
          }

          if (-not ($assetNames | Where-Object { $_ -like "Assetra-*-full.nupkg" })) {
            $missing.Add("Assetra-*-full.nupkg")
          }

          if ($missing.Count -gt 0) {
            Write-Host "Velopack output files:"
            Get-ChildItem -Path $releaseDir -Force | Select-Object Name, Length | Format-Table -AutoSize
            throw "Missing required Velopack update assets: $($missing -join ', ')"
          }

      - name: Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          vpk upload github
          --repoUrl https://github.com/oange6214/Assetra
          --publish
          --releaseName "Assetra ${{ github.ref_name }}"
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --outputDir releases/

      - name: Validate GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assetNames = @()
          $missing = @()

          for ($attempt = 1; $attempt -le 6; $attempt++) {
            $assetNames = @(gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq ".assets[].name")
            $missing = New-Object System.Collections.Generic.List[string]

            foreach ($name in @("RELEASES", "releases.win.json", "Assetra-win-Setup.exe", "Assetra-win-Portable.zip")) {
              if ($assetNames -notcontains $name) {
                $missing.Add($name)
              }
            }

            if (-not ($assetNames | Where-Object { $_ -like "Assetra-*-full.nupkg" })) {
              $missing.Add("Assetra-*-full.nupkg")
            }

            if ($missing.Count -eq 0) {
              break
            }

            if ($attempt -lt 6) {
              Write-Host "Required release assets not visible yet; retrying in 5 seconds..."
              Start-Sleep -Seconds 5
            }
          }

          if ($missing.Count -gt 0) {
            Write-Host "GitHub release assets:"
            $assetNames | ForEach-Object { Write-Host " - $_" }
            throw "GitHub release $tag is missing required Velopack update assets: $($missing -join ', ')"
          }
