name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full git history for semver

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Assetra.slnx

      - name: Build
        run: dotnet build Assetra.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Assetra.Tests/Assetra.Tests.csproj --no-build --configuration Release --verbosity normal
